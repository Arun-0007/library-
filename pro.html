
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bookholic Profile</title>

<style>

body{
background:#0b0b0b;
font-family:Arial;
color:white;
}

.container{
width:900px;
margin:auto;
padding:30px;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

/* Profile Image */

.profile-pic{
text-align:center;
}

.profile-pic img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid orange;
object-fit:cover;
}

.profile-pic input{
margin-top:10px;
color:white;
}

/* Progress Circle */

.progress-circle{
width:120px;
height:120px;
border-radius:50%;
background:conic-gradient(orange 65%, #333 0);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
}

/* Form */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

label{
display:block;
margin-bottom:5px;
font-size:14px;
}

input, select{
width:100%;
padding:10px;
border-radius:8px;
border:2px solid orange;
background:#1a1a1a;
color:white;
}

.full{
grid-column:1/3;
}

.submit-btn{
margin-top:20px;
padding:14px;
width:100%;
background:orange;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.submit-btn:hover{
background:#ffb733;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<!-- Profile Image -->
<div class="profile-pic">
<img id="preview" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
<br>
<input type="file" onchange="loadImage(event)">
</div>

<!-- Performance Circle -->
<div class="progress-circle">
65%
</div>

</div>


<form>

<div class="form-grid">

<div>
<label>Name</label>
<input type="text" placeholder="Enter Name">
</div>

<div>
<label>Date of Birth</label>
<input type="date">
</div>

<div>
<label>Member in Bookholic</label>
<input type="text">
</div>

<div>
<label>Gender</label>
<select>
<option>Male</option>
<option>Female</option>
</select>
</div>

<div>
<label>Phone Number</label>
<input type="tel" placeholder="Phone Number">
</div>

<div>
<label>Email ID</label>
<input type="email" placeholder="Email">
</div>

<div>
<label>Subscribed Books</label>
<input type="number" value="0">
</div>

<div>
<label>Fine</label>
<input type="number" value="0">
</div>

<div class="full">
<label>Performance</label>
<select>
<option>Excellent</option>
<option>Good</option>
<option>Average</option>
<option>Poor</option>
</select>
</div>

<div class="full">
<button onclick="window.location.href='og.html'">
    Submit
</button>    
</div>

</div>

</form>

</div>

<script>

/* Profile Image Preview */

function loadImage(event){
var image=document.getElementById('preview');
image.src=URL.createObjectURL(event.target.files[0]);
}

</script>

</body>
</html>
